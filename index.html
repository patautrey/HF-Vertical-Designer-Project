<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HF Engineering Suite</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div id="app">

<!-- ========================= -->
<!-- SIDEBAR NAVIGATION        -->
<!-- ========================= -->
<div id="sidebar">
<ul class="nav flex-column">
<li class="nav-item"><a href="#" class="nav-link" data-view="vertical-designer">Vertical Designer</a></li>
<li class="nav-item"><a href="#" class="nav-link" data-view="feedline-matching">Feedline &amp; Matching</a></li>
<li class="nav-item"><a href="#" class="nav-link" data-view="dx-patterns">DX &amp; Patterns</a></li>
<li class="nav-item"><a href="#" class="nav-link" data-view="nvis-field">NVIS &amp; Field Ops</a></li>
<li class="nav-item"><a href="#" class="nav-link" data-view="doublet-designer">Doublet Designer</a></li>
<li class="nav-item"><a href="#" class="nav-link" data-view="random-wire">Random‑Wire + 9:1</a></li>
</ul>
</div>

<!-- ========================= -->
<!-- MAIN CONTENT AREA         -->
<!-- ========================= -->
<div id="main">

<!-- ========================= -->
<!-- VERTICAL DESIGNER MODULE  -->
<!-- ========================= -->
<div id="vertical-designer-view" class="view" style="display:none;">
<h2>Vertical Designer</h2>

<label for="vdMode">Mode</label>
<select id="vdMode">
<option value="single">Single-Band Mode</option>
<option value="multi">Multi-Band Mode</option>
</select>

<label for="vdBands">Bands</label>
<select id="vdBands" multiple>
<option value="80">80m</option>
<option value="60">60m</option>
<option value="40">40m</option>
<option value="30">30m</option>
<option value="20">20m</option>
<option value="17">17m</option>
<option value="15">15m</option>
<option value="12">12m</option>
<option value="10">10m</option>
</select>

<label for="vdType">Antenna Type</label>
<select id="vdType">
<option value="quarter">1/4‑Wave Vertical</option>
<option value="half">1/2‑Wave Vertical</option>
<option value="fiveEighths">5/8‑Wave Vertical</option>
<option value="sixFour">0.64‑Wave Vertical</option>
<option value="sevenZero">0.70‑Wave DX Turbo</option>
<option value="threeQuarter">3/4‑Wave Vertical</option>
<option value="custom">Custom Electrical Length</option>
<option value="loaded">Loaded Vertical</option>
<option value="trap">Trap Vertical</option>
<option value="fan">Fan Vertical</option>
<option value="efhw">EFHW Vertical</option>
</select>

<div id="vdCustomBlock" style="display:none;">
<label for="vdCustomLength">Electrical Length (λ)</label>
<input type="number" id="vdCustomLength" step="0.01">
</div>

<label for="vdHeight">Height Above Ground (ft)</label>
<input type="number" id="vdHeight">

<label for="vdGround">Ground Quality</label>
<select id="vdGround">
<option value="poor">Poor Ground</option>
<option value="average" selected>Average Ground</option>
<option value="good">Good Ground</option>
</select>

<label for="vdRadialCount">Number of Radials</label>
<input type="number" id="vdRadialCount" value="16">

<label for="vdRadialLength">Radial Length (ft)</label>
<input type="number" id="vdRadialLength">

<label for="vdRadialType">Radial Type</label>
<select id="vdRadialType">
<option value="ground">Ground-Mounted</option>
<option value="elevated">Elevated</option>
</select>

<button id="vdAnalyze">Analyze Vertical</button>

<div id="vdResults"></div>
<div id="vdWarnings"></div>
</div>

<!-- ========================= -->
<!-- FEEDLINE & MATCHING       -->
<!-- ========================= -->
<div id="feedline-matching-view" class="view" style="display:none;">
<h2>Feedline & Matching</h2>

<label for="flType">Feedline Type</label>
<select id="flType">
<option value="rg58">RG‑58 (0.64 VF)</option>
<option value="rg8x">RG‑8X (0.78 VF)</option>
<option value="rg213">RG‑213 (0.66 VF)</option>
<option value="lmr240">LMR‑240 (0.84 VF)</option>
<option value="lmr400">LMR‑400 (0.85 VF)</option>
<option value="ladder300">300 Ω Ladder Line</option>
<option value="ladder450">450 Ω Ladder Line</option>
<option value="ladder600">600 Ω Ladder Line</option>
<option value="custom">Custom Feedline</option>
</select>

<div id="flCustomBlock" style="display:none;">
<label for="flCustomVF">Custom Velocity Factor</label>
<input type="number" id="flCustomVF" step="0.01">
</div>

<label for="flLength">Feedline Length (ft)</label>
<input type="number" id="flLength" value="50">

<label for="flFreq">Operating Frequency (MHz)</label>
<input type="number" id="flFreq" value="14.2">

<label for="flLoadZ">Load Impedance (Ω)</label>
<input type="number" id="flLoadZ" value="50">

<label for="flSourceZ">Source Impedance (Ω)</label>
<input type="number" id="flSourceZ" value="50">

<button id="flAnalyze">Analyze Feedline</button>

<div id="flResults"></div>
<div id="flWarnings"></div>
</div>

<!-- ========================= -->
<!-- DX & PATTERNS             -->
<!-- ========================= -->
<div id="dx-patterns-view" class="view" style="display:none;">
<h2>DX & Patterns</h2>

<label for="dxFreq">Frequency (MHz)</label>
<input type="number" id="dxFreq" value="14.2">

<label for="dxHeight">Antenna Height (ft)</label>
<input type="number" id="dxHeight" value="33">

<label for="dxAntennaType">Antenna Type</label>
<select id="dxAntennaType">
<option value="vertical">Vertical</option>
<option value="dipole">Dipole</option>
<option value="invertedV">Inverted‑V</option>
<option value="efhw">EFHW</option>
<option value="loop">Loop</option>
<option value="yagi">Yagi</option>
</select>

<label for="dxGround">Ground Quality</label>
<select id="dxGround">
<option value="poor">Poor</option>
<option value="average" selected>Average</option>
<option value="good">Good</option>
</select>

<label for="dxMode">Pattern Mode</label>
<select id="dxMode">
<option value="elevation">Elevation Pattern</option>
<option value="azimuth">Azimuth Pattern</option>
<option value="dxScore">DX Score</option>
</select>

<button id="dxAnalyze">Analyze Pattern</button>

<div id="dxResults"></div>
<div id="dxWarnings"></div>
</div>

<!-- ========================= -->
<!-- NVIS FIELD OPS            -->
<!-- ========================= -->
<div id="nvis-field-view" class="view" style="display:none;">
<h2>NVIS & Field Ops</h2>

<label for="nvisBand">Band</label>
<select id="nvisBand">
<option value="80">80m</option>
<option value="60">60m</option>
<option value="40">40m</option>
</select>

<label for="nvisType">Antenna Type</label>
<select id="nvisType">
<option value="lowDipole">Low Dipole</option>
<option value="invertedV">Inverted‑V</option>
<option value="randomWire">Random Wire</option>
<option value="doublet">Doublet</option>
<option value="loop">Horizontal Loop</option>
</select>

<label for="nvisHeight">Antenna Height (ft)</label>
<input type="number" id="nvisHeight" value="12">

<label for="nvisGround">Ground Quality</label>
<select id="nvisGround">
<option value="poor">Poor</option>
<option value="average" selected>Average</option>
<option value="good">Good</option>
</select>

<label for="nvisContext">Deployment Context</label>
<select id="nvisContext">
<option value="portable">Portable / Field</option>
<option value="fixed">Fixed Station</option>
</select>

<label for="nvisWireLength">Wire Length (ft)</label>
<input type="number" id="nvisWireLength" value="66">

<label for="nvisLoopShape">Loop Shape</label>
<select id="nvisLoopShape">
<option value="square">Square</option>
<option value="delta">Delta</option>
<option value="rectangle">Rectangle</option>
</select>

<button id="nvisAnalyze">Evaluate NVIS</button>

<div id="nvisResults"></div>
<div id="nvisWarnings"></div>
</div>

<!-- ========================= -->
<!-- DOUBLET DESIGNER          -->
<!-- ========================= -->
<div id="doublet-designer-view" class="view" style="display:none;">
<h2>Doublet Designer</h2>

<label for="ddType">Doublet Type</label>
<select id="ddType">
<option value="custom">Custom Doublet</option>
<option value="g5rv">G5RV</option>
<option value="zs6bkw">ZS6BKW</option>
<option value="20m">20m Doublet</option>
<option value="40m">40m Doublet</option>
<option value="80m">80m Doublet</option>
</select>

<label for="ddWireLength">Wire Length (ft)</label>
<input type="number" id="ddWireLength">

<label for="ddLLLength">Ladder Line Length (ft)</label>
<input type="number" id="ddLLLength">

<label for="ddLLZ">Ladder Line Impedance (Ω)</label>
<select id="ddLLZ">
<option value="300">300 Ω</option>
<option value="450">450 Ω</option>
<option value="600">600 Ω</option>
</select>

<label for="ddBalun">Balun Type</label>
<select id="ddBalun">
<option value="1to1">1:1 Current Balun</option>
<option value="4to1">4:1 Current Balun</option>
<option value="unun9to1">9:1 Unun</option>
</select>

<label for="ddHeight">Feedpoint Height (ft)</label>
<input type="number" id="ddHeight" value="35">

<label for="ddBands">Bands</label>
<select id="ddBands" multiple>
<option value="80">80m</option>
<option value="60">60m</option>
<option value="40">40m</option>
<option value="30">30m</option>
<option value="20">20m</option>
<option value="17">17m</option>
<option value="15">15m</option>
<option value="12">12m</option>
<option value="10">10m</option>
</select>

<button id="ddAnalyze">Analyze Doublet</button>

<div id="ddResults"></div>
<div id="ddWarnings"></div>
</div>

<!-- ========================= -->
<!-- RANDOM WIRE               -->
<!-- ========================= -->
<div id="random-wire-view" class="view" style="display:none;">
<h2>Random‑Wire + 9:1</h2>

<label for="rwLength">Wire Length (ft)</label>
<input type="number" id="rwLength" value="29">

<label for="rwTransformer">Transformer</label>
<select id="rwTransformer">
<option value="9to1">9:1 Unun</option>
<option value="4to1">4:1 Balun</option>
<option value="1to1">1:1 Current Balun</option>
</select>

<label for="rwCounterpoise">Counterpoise Length (ft)</label>
<input type="number" id="rwCounterpoise" value="17">

<label for="rwHeight">Antenna Height (ft)</label>
<input type="number" id="rwHeight" value="25">

<label for="rwGround">Ground Quality</label>
<select id="rwGround">
<option value="poor">Poor</option>
<option value="average" selected>Average</option>
<option value="good">Good</option>
</select>

<label for="rwBands">Bands</label>
<select id="rwBands" multiple>
<option value="80">80m</option>
<option value="60">60m</option>
<option value="40">40m</option>
<option value="30">30m</option>
<option value="20">20m</option>
<option value="17">17m</option>
<option value="15">15m</option>
<option value="12">12m</option>
<option value="10">10m</option>
</select>

<button id="rwAnalyze">Analyze Random Wire</button>

<div id="rwResults"></div>
<div id="rwWarnings"></div>
</div>

</div> <!-- end main -->
</div> <!-- end app -->

<!-- ========================= -->
<!-- JAVASCRIPT MODULES        -->
<!-- ========================= -->
<script src="js/utils.js"></script>
<script src="js/app.js"></script>

<script src="js/vertical-designer.js"></script>
<script src="js/feedline-matching.js"></script>
<script src="js/dx-patterns.js"></script>
<script src="js/nvis-field.js"></script>
<script src="js/doublet-designer.js"></script>
<script src="js/random-wire.js"></script>

</body>
</html>
