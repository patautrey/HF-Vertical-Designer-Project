<!-- ============================================================
     DX Patterns — Partial View
     ============================================================ -->

<section class="tool-header">
    <h2>DX Pattern Explorer</h2>
    <p>Analyze takeoff angles, lobe formation, and DX potential.</p>
</section>

<section class="tool-body">

    <!-- INPUT PANEL -->
    <div class="input-panel">

        <div class="input-row">
            <label for="dxFreq">Frequency (MHz):</label>
            <input type="number" id="dxFreq" placeholder="e.g., 14.2">
        </div>

        <div class="input-row">
            <label for="dxHeight">Antenna Height (ft):</label>
            <input type="number" id="dxHeight" placeholder="e.g., 33">
        </div>

        <div class="input-row">
            <label for="dxLength">Antenna Length (ft):</label>
            <input type="number" id="dxLength" placeholder="e.g., 66">
        </div>

        <button id="dxCalc" class="calc-btn">Analyze</button>
        <button id="dxExport" class="calc-btn">Download Results</button>
    </div>

    <!-- OUTPUT PANEL -->
    <div class="output-panel">

        <h3>Results</h3>

        <div class="result-row">
            <label>Wavelength:</label>
            <span id="dxWavelength">—</span>
        </div>

        <div class="result-row">
            <label>Height / Wavelength Ratio:</label>
            <span id="dxRatio">—</span>
        </div>

        <div class="result-row">
            <label>Primary Takeoff Angle:</label>
            <span id="dxAngle">—</span>
        </div>

        <div class="result-row">
            <label>Lobe Classification:</label>
            <span id="dxClass">—</span>
        </div>

        <div class="result-row">
            <label>DX Potential:</label>
            <span id="dxPotential">—</span>
        </div>

    </div>

</section>
