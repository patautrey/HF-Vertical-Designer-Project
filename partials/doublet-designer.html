<div id="doublet-designer-view" class="view" style="display:none;">
<h2>Doublet Designer</h2>

<!-- Doublet Type -->
<label for="ddType">Doublet Type</label>
<select id="ddType">
<option value="custom">Custom Doublet</option>
<option value="g5rv">G5RV</option>
<option value="zs6bkw">ZS6BKW</option>
<option value="20m">20m Doublet</option>
<option value="40m">40m Doublet</option>
<option value="80m">80m Doublet</option>
</select>

<!-- Wire Length -->
<label for="ddWireLength">Wire Length (ft)</label>
<input type="number" id="ddWireLength" placeholder="e.g., 102">

<!-- Ladder Line Length -->
<label for="ddLLLength">Ladder Line Length (ft)</label>
<input type="number" id="ddLLLength" placeholder="e.g., 34">

<!-- Ladder Line Impedance -->
<label for="ddLLZ">Ladder Line Impedance (Ω)</label>
<select id="ddLLZ">
<option value="300">300 Ω</option>
<option value="450">450 Ω</option>
<option value="600">600 Ω</option>
</select>

<!-- Balun Type -->
<label for="ddBalun">Balun Type</label>
<select id="ddBalun">
<option value="1to1">1:1 Current Balun</option>
<option value="4to1">4:1 Current Balun</option>
<option value="unun9to1">9:1 Unun (Not Recommended)</option>
</select>

<!-- Feedpoint Height -->
<label for="ddHeight">Feedpoint Height (ft)</label>
<input type="number" id="ddHeight" value="35">

<!-- Bands -->
<label for="ddBands">Bands</label>
<select id="ddBands" multiple>
<option value="80">80m</option>
<option value="60">60m</option>
<option value="40">40m</option>
<option value="30">30m</option>
<option value="20">20m</option>
<option value="17">17m</option>
<option value="15">15m</option>
<option value="12">12m</option>
<option value="10">10m</option>
</select>

<!-- Analyze Button -->
<button id="ddAnalyze">Analyze Doublet</button>

<!-- Results -->
<div id="ddResults"></div>
<div id="ddWarnings"></div>

</div>
