<!-- ============================================================
     Doublet Designer — Partial View
     ============================================================ -->

<section class="tool-header">
    <h2>Doublet Designer</h2>
    <p>Analyze doublet length, ladder-line behavior, and impedance tendencies.</p>
</section>

<section class="tool-body">

    <!-- INPUT PANEL -->
    <div class="input-panel">

        <div class="input-row">
            <label for="dblWire">Total Wire Length (ft):</label>
            <input type="number" id="dblWire" placeholder="e.g., 88">
        </div>

        <div class="input-row">
            <label for="dblLadder">Ladder Line Length (ft):</label>
            <input type="number" id="dblLadder" placeholder="e.g., 40">
        </div>

        <div class="input-row">
            <label for="dblZ">Ladder Line Z (Ω):</label>
            <input type="number" id="dblZ" placeholder="e.g., 450">
        </div>

        <div class="input-row">
            <label for="dblBands">Bands (MHz, comma-separated):</label>
            <input type="text" id="dblBands" placeholder="e.g., 3.5, 7, 14, 21">
        </div>

        <button id="dblCalc" class="calc-btn">Analyze</button>
        <button id="dblExport" class="calc-btn">Download Results</button>
    </div>

    <!-- OUTPUT PANEL -->
    <div class="output-panel">

        <h3>Results</h3>

        <div class="result-row">
            <label>Impedance Tendency:</label>
            <span id="dblImpedance">—</span>
        </div>

        <div class="result-row">
            <label>Band Coverage:</label>
            <span id="dblCoverage">—</span>
        </div>

        <div class="result-row">
            <label>Recommended Tuner:</label>
            <span id="dblTuner">—</span>
        </div>

    </div>

</section>
