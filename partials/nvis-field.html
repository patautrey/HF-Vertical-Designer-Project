<!-- ============================================================
     NVIS Field — Partial View
     ============================================================ -->

<section class="tool-header">
    <h2>NVIS Field Estimator</h2>
    <p>Evaluate NVIS suitability, takeoff angle, and regional HF coverage.</p>
</section>

<section class="tool-body">

    <!-- INPUT PANEL -->
    <div class="input-panel">

        <div class="input-row">
            <label for="nvisFreq">Frequency (MHz):</label>
            <input type="number" id="nvisFreq" placeholder="e.g., 5.3">
        </div>

        <div class="input-row">
            <label for="nvisHeight">Antenna Height (ft):</label>
            <input type="number" id="nvisHeight" placeholder="e.g., 12">
        </div>

        <div class="input-row">
            <label for="nvisWire">Antenna Length (ft):</label>
            <input type="number" id="nvisWire" placeholder="e.g., 66">
        </div>

        <button id="nvisCalc" class="calc-btn">Analyze</button>
        <button id="nvisExport" class="calc-btn">Download Results</button>
    </div>

    <!-- OUTPUT PANEL -->
    <div class="output-panel">

        <h3>Results</h3>

        <div class="result-row">
            <label>Wavelength:</label>
            <span id="nvisWavelength">—</span>
        </div>

        <div class="result-row">
            <label>Height / Wavelength Ratio:</label>
            <span id="nvisRatio">—</span>
        </div>

        <div class="result-row">
            <label>Estimated NVIS Angle:</label>
            <span id="nvisAngle">—</span>
        </div>

        <div class="result-row">
            <label>Coverage Radius:</label>
            <span id="nvisRadius">—</span>
        </div>

        <div class="result-row">
            <label>NVIS Suitability:</label>
            <span id="nvisSuitability">—</span>
        </div>

    </div>

</section>
