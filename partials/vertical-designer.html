<!-- ============================================================
     Vertical Designer — Partial View
     ============================================================ -->

<section class="tool-header">
    <h2>Vertical Designer</h2>
    <p>Calculate resonant lengths, radial systems, and HF performance.</p>
</section>

<section class="tool-body">

    <!-- INPUTS -->
    <div class="input-panel">

        <div class="input-row">
            <label for="band">Band (MHz):</label>
            <input type="number" id="band" placeholder="e.g., 7.2">
        </div>

        <div class="input-row">
            <label for="height">Vertical Height (ft):</label>
            <input type="number" id="height" placeholder="e.g., 33">
        </div>

        <div class="input-row">
            <label for="radials">Number of Radials:</label>
            <input type="number" id="radials" placeholder="e.g., 16">
        </div>

        <div class="input-row">
            <label for="radialLength">Radial Length (ft):</label>
            <input type="number" id="radialLength" placeholder="e.g., 33">
        </div>

        <button id="calcVertical" class="calc-btn">Calculate</button>
    </div>

    <!-- OUTPUTS -->
    <div class="output-panel">

        <h3>Results</h3>

        <div class="result-row">
            <label>Wavelength:</label>
            <span id="outWavelength">—</span>
        </div>

        <div class="result-row">
            <label>Resonant Length:</label>
            <span id="outResonant">—</span>
        </div>

        <div class="result-row">
            <label>NVIS Angle:</label>
            <span id="outNVIS">—</span>
        </div>

        <div class="result-row">
            <label>DX Lobe Tendency:</label>
            <span id="outDX">—</span>
        </div>

        <div class="result-row">
            <label>Radial Efficiency:</label>
            <span id="outRadials">—</span>
        </div>

    </div>

</section>
