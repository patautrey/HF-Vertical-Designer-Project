<!-- ============================================================
     Vertical Designer — Partial View
     ============================================================ -->

<section class="tool-header">
    <h2>Vertical Designer</h2>
    <p>Model HF verticals, radials, and takeoff behavior.</p>
</section>

<section class="tool-body">

    <!-- INPUT PANEL -->
    <div class="input-panel">

        <div class="input-row">
            <label for="vdBand">Band (MHz):</label>
            <input type="number" id="vdBand" placeholder="e.g., 7.1">
        </div>

        <div class="input-row">
            <label for="vdHeight">Vertical Height (ft):</label>
            <input type="number" id="vdHeight" placeholder="e.g., 33">
        </div>

        <div class="input-row">
            <label for="vdRadials">Radial Count:</label>
            <input type="number" id="vdRadials" placeholder="e.g., 16">
        </div>

        <div class="input-row">
            <label for="vdRadialLen">Radial Length (ft):</label>
            <input type="number" id="vdRadialLen" placeholder="e.g., 16">
        </div>

        <button id="vdCalc" class="calc-btn">Calculate</button>
        <button id="vdExport" class="calc-btn">Download Results</button>
    </div>

    <!-- OUTPUT PANEL -->
    <div class="output-panel">

        <h3>Results</h3>

        <div class="result-row">
            <label>Wavelength:</label>
            <span id="vdWavelength">—</span>
        </div>

        <div class="result-row">
            <label>Resonant Length:</label>
            <span id="vdResonant">—</span>
        </div>

        <div class="result-row">
            <label>NVIS Angle:</label>
            <span id="vdNVIS">—</span>
        </div>

        <div class="result-row">
            <label>DX Tendency:</label>
            <span id="vdDX">—</span>
        </div>

        <div class="result-row">
            <label>Radial Efficiency:</label>
            <span id="vdRadialEff">—</span>
        </div>

    </div>

</section>
