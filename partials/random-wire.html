<!-- ============================================================
     Random Wire Analyzer — Partial View
     ============================================================ -->

<section class="tool-header">
    <h2>Random Wire Analyzer</h2>
    <p>Evaluate random-wire lengths, avoid-lengths, and band coverage.</p>
</section>

<section class="tool-body">

    <!-- INPUT PANEL -->
    <div class="input-panel">

        <div class="input-row">
            <label for="rwLength">Wire Length (ft):</label>
            <input type="number" id="rwLength" placeholder="e.g., 71">
        </div>

        <div class="input-row">
            <label for="rwBands">Bands (MHz, comma-separated):</label>
            <input type="text" id="rwBands" placeholder="e.g., 3.5, 7, 14, 18, 21">
        </div>

        <button id="rwCalc" class="calc-btn">Analyze</button>
    </div>

    <!-- OUTPUT PANEL -->
    <div class="output-panel">

        <h3>Results</h3>

        <div class="result-row">
            <label>Avoid-Length Classification:</label>
            <span id="rwClass">—</span>
        </div>

        <div class="result-row">
            <label>Band Coverage:</label>
            <span id="rwCoverage">—</span>
        </div>

        <div class="result-row">
            <label>Recommended Match:</label>
            <span id="rwMatch">—</span>
        </div>

    </div>

</section>
