<!-- ============================================================
     Feedline & Matching — Partial View
     ============================================================ -->

<section class="tool-header">
    <h2>Feedline & Matching</h2>
    <p>Analyze feedline loss, SWR transformation, and matching options.</p>
</section>

<section class="tool-body">

    <!-- INPUT PANEL -->
    <div class="input-panel">

        <div class="input-row">
            <label for="fmFreq">Frequency (MHz):</label>
            <input type="number" id="fmFreq" placeholder="e.g., 14.2">
        </div>

        <div class="input-row">
            <label for="fmSWR">Antenna SWR:</label>
            <input type="number" id="fmSWR" placeholder="e.g., 3.5">
        </div>

        <div class="input-row">
            <label for="fmLength">Feedline Length (ft):</label>
            <input type="number" id="fmLength" placeholder="e.g., 50">
        </div>

        <div class="input-row">
            <label for="fmType">Feedline Type:</label>
            <select id="fmType">
                <option value="rg8x">RG‑8X</option>
                <option value="rg213">RG‑213</option>
                <option value="lmr240">LMR‑240</option>
                <option value="lmr400">LMR‑400</option>
                <option value="ladder450">450Ω Ladder Line</option>
            </select>
        </div>

        <button id="fmCalc" class="calc-btn">Calculate</button>
        <button id="fmExport" class="calc-btn">Download Results</button>
    </div>

    <!-- OUTPUT PANEL -->
    <div class="output-panel">

        <h3>Results</h3>

        <div class="result-row">
            <label>Loss (dB):</label>
            <span id="fmLoss">—</span>
        </div>

        <div class="result-row">
            <label>Delivered Power (%):</label>
            <span id="fmPower">—</span>
        </div>

        <div class="result-row">
            <label>Transformed SWR:</label>
            <span id="fmTransformed">—</span>
        </div>

        <div class="result-row">
            <label>Recommended Match:</label>
            <span id="fmMatch">—</span>
        </div>

    </div>

</section>
